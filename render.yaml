services:
  - type: web
    name: safenote
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn safenote_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SAFENOTE_DB
        value: /data/safenote.db
      - key: PUBLIC_DELAY_SECONDS
        value: "86400"
      - key: ADMIN_SECRET
        generateValue: true
    disk:
      name: safenote-data
      mountPath: /data
      sizeGB: 1
